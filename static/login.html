<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Smart Invoice</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    
    <script>
        // Automatically redirect to Auth0 login after a brief moment for the UI to render
        window.onload = function() {
            setTimeout(() => {
                window.location.href = '/api/auth/login';
            }, 800);
        };
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 text-center max-w-sm w-full mx-4">
        <div class="mb-6 flex justify-center">
            <div class="relative">
                <div class="absolute inset-0 bg-blue-100 rounded-2xl animate-ping opacity-75"></div>
                <img src="/images/logo.png" alt="Logo" class="h-16 w-16 relative z-10 bg-white rounded-2xl p-2 border border-slate-100 shadow-sm">
            </div>
        </div>
        
        <h1 class="text-xl font-bold text-slate-900 mb-2">Smart Invoice</h1>
        <p class="text-slate-500 text-sm">Connecting you securely...</p>
        
        <div class="mt-8 flex gap-1 justify-center">
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: -0.3s"></div>
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: -0.15s"></div>
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce"></div>
        </div>
    </div>

</body>
</html>
